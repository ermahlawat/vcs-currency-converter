<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCs Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="main-title"><b>VCs</b> Currency Converter</h1>
            <p class="subtitle">Use the currency calculator below to get an instant conversion and word-based output.</p>
        </header>

        <div class="calculator-box">
            <div class="input-row">
                <label>Amount to convert</label>
                <input type="number" id="amount" placeholder="Enter Amount" value="1000">
            </div>

            <div class="input-row">
                <label>Currencies to exchange</label>
                <div class="selectors">
                    <select id="from-currency"></select>
                    <button id="swap-btn" class="swap-btn">⇄</button>
                    <select id="to-currency"></select>
                </div>
            </div>

            <div class="theme-row">
                <span>Date <b>04/07/2026</b></span>
                <span class="divider">|</span>
                <button id="theme-toggle" class="text-btn">Toggle Dark Mode</button>
            </div>

            <div class="result-section">
                <h2 id="res-value">0.00</h2>
                <div class="word-box">
                    <span id="word-value">Calculating...</span>
                    <button id="copy-words" class="copy-icon" title="Copy">📋</button>
                </div>
                <p id="rate-text" class="rate-info">Fetching live market rates...</p>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">Copied to clipboard</div>
    <script src="script.js"></script>
</body>
</html>
